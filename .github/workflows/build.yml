name: Build and Push Image

# ─────────────────────────────────────────────────────────────
# 触发：推送到 main 分支，或手动运行（workflow_dispatch）
#
# 说明：192.168.9.12 是内网地址，GitHub 托管 runner 无法直连，
# 因此本工作流只负责【构建镜像 + 推送到 GHCR】。
# 部署由【能直连服务器的机器】（本开发容器）通过
#   scripts/deploy_remote.sh
# SSH 到服务器拉取镜像并重启容器。
#
# 若以后在服务器上配置了 GitHub self-hosted runner，
# 可在本文件追加 deploy job（runs-on: self-hosted）实现全自动部署。
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

# 防止并发构建互相覆盖镜像 tag
concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Push (slim multi-stage)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # 内置 token，自动有 packages:write 权限

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit 跨构建缓存：加速重复构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 关闭 provenance attestation，避免某些注册表兼容问题
          provenance: false

      - name: Image digest
        run: |
          echo "✅ Pushed tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "digest: ${{ steps.push.outputs.digest }}"

      - name: Summary
        run: |
          echo "### 🐳 Image built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Deploy with: \`scripts/deploy_remote.sh\`" >> $GITHUB_STEP_SUMMARY
